<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Powered File Renamer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dark-100': '#111827', // slate-900
                        'dark-200': '#1F2937', // slate-800
                        'dark-300': '#374151', // slate-700
                        'dark-content': '#D1D5DB', // slate-300
                        'bg': '#0c0d10',
                        'card-bg': '#14161a',
                        'card-border': '#22252b',
                        'text-primary': '#ffffff',
                        'text-secondary': '#8a8d94',
                        'accent-print': '#3b82f6',
                        'accent-success': '#10b981',
                        'accent-download': '#f59e0b',
                        'selection': '#1e2128',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(-10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    }
                }
            }
        }
    </script>
